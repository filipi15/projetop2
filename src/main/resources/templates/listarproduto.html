<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos – Groove Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="nav-overlay"></div>

  <nav class="sticky">
    <a href="/" class="nav-logo">Groove Store</a>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-menu">
            <ul class="nav-links">
      <li><a href="/">Início</a></li>
      <li><a href="/catalogo">Catálogo</a></li>
      <li sec:authorize="hasAuthority('admin')"><a href="/listaUsuarios">Usuários</a></li>
    </ul>
        <div class="nav-auth">
      <a href="/produto/listar" class="nav-auth-login active">Produtos</a>
      <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit" class="nav-auth-register" style="border:none;cursor:pointer">Sair</button>
      </form>
    </div>
    </div>
  </nav>

  <div class="page-header users-page-header">
    <div class="breadcrumb">
      <a href="/">Início</a>
      <span>›</span>
      <span>Produtos</span>
    </div>
    <h1 class="page-title">Produtos Cadastrados</h1>
  </div>

  <div class="users-content">
    <div class="table-wrap">
      <table class="users-table">
        <thead>
          <tr>
            <th>Capa</th>
            <th>Artista</th>
            <th>Álbum</th>
            <th>Formato</th>
            <th>Preço</th>
            <th>Ano</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="produto : ${produtos}">
            <td><img class="thumb" th:src="${produto.imagem}" th:alt="${produto.album}"/></td>
            <td th:text="${produto.artista}"></td>
            <td><a th:text="${produto.album}" th:href="@{'/produto/' + ${produto.id}}"></a></td>
            <td th:text="${produto.formato}"></td>
            <td th:text="'R$ ' + ${produto.preco}"></td>
            <td th:text="${produto.ano}"></td>
            <td><a th:href="@{'/produto/' + ${produto.id} + '/editar'}">Editar</a></td>
            <td>
              <form th:action="@{'/produto/' + ${produto.id} + '/deletar'}" method="post">
                <button type="submit" class="danger">Deletar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="table-actions">
        <a th:href="@{/produto}" class="btn-primary">+ Cadastrar produto</a>
        <a th:href="@{/}" class="btn-ghost">Voltar</a>
      </div>
    </div>
  </div>


  <script>
    (function(){
      var t = document.querySelector('.nav-toggle');
      var o = document.querySelector('.nav-overlay');
      function close(){ document.body.classList.remove('nav-open'); }
      if(t){ t.addEventListener('click', function(){ document.body.classList.toggle('nav-open'); }); }
      if(o){ o.addEventListener('click', close); }
      document.querySelectorAll('.nav-menu a').forEach(function(a){ a.addEventListener('click', close); });
    })();
  </script>
</body>
</html>
