<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários – Groove Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="sticky">
    <a href="/" class="nav-logo">Groove Store</a>
    <ul class="nav-links">
      <li><a href="/">Início</a></li>
      <li><a href="/catalogo">Catálogo</a></li>
      <li><a href="#">Novidades</a></li>
      <li><a href="#">Contato</a></li>
      <li><a href="/listaUsuarios" class="active">Usuários</a></li>
    </ul>
    <div class="nav-auth">
      <a href="/login" class="nav-auth-login">Entrar</a>
      <a href="/cadastro" class="nav-auth-register">Cadastrar</a>
    </div>
  </nav>

  <div class="page-header users-page-header">
    <div class="breadcrumb">
      <a href="/">Início</a>
      <span>›</span>
      <span>Usuários</span>
    </div>
    <h1 class="page-title">Usuários Cadastrados</h1>
  </div>

  <div class="users-content">
    <div class="table-wrap">
      <table class="users-table">
        <thead>
          <tr>
            <th>Usuário (ID)</th>
            <th>Nome</th>
            <th>E-mail</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.nome}"></td>
            <td th:text="${user.email}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
