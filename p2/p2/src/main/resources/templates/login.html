<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Groove Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="auth-page">

    <!-- LADO ESQUERDO — DECORATIVO -->
    <div class="auth-deco">
      <div class="auth-deco-ring">
        <div class="auth-deco-vinyl">
          <div class="auth-deco-label">
            <span>GS</span>
          </div>
        </div>
      </div>
      <div class="auth-deco-text">
        <h2 class="auth-deco-title">O Som que<br/><em>Nunca Envelhece</em></h2>
        <p class="auth-deco-sub">Vinis &amp; CDs selecionados para você</p>
      </div>
    </div>

    <!-- LADO DIREITO — FORMULÁRIO -->
    <div class="auth-form-side">

      <a href="/" class="auth-logo">Groove Store</a>

      <p class="auth-eyebrow">Bem-vindo de volta</p>
      <h1 class="auth-title">Entrar na<br/>sua conta</h1>
      <p class="auth-subtitle">
        Não tem uma conta?
        <a href="/cadastro">Cadastre-se grátis</a>
      </p>

      <form action="/login" method="post">

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" onclick="toggleSenha('senha', this)" aria-label="Mostrar senha">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-actions">
          <label class="form-check">
            <input type="checkbox" name="lembrar"/>
            <div class="form-check-box"></div>
            <span>Lembrar de mim</span>
          </label>
          <a href="#" class="form-forgot">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn-auth">Entrar</button>

        <div class="auth-divider"><span>ou</span></div>

        <p class="auth-switch">
          Ainda não tem conta?
          <a href="/cadastro">Criar conta</a>
        </p>

      </form>
    </div>

  </div>

  <script>
    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
             <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
             <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
             <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
             <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
             <circle cx="12" cy="12" r="3"/>
           </svg>`;
    }
  </script>

</body>
</html>
