<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro – Groove Store</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="auth-page">

    <!-- LADO ESQUERDO — DECORATIVO -->
    <div class="auth-deco">
      <div class="auth-deco-ring">
        <div class="auth-deco-vinyl">
          <div class="auth-deco-label">
            <span>GS</span>
          </div>
        </div>
      </div>
      <div class="auth-deco-text">
        <h2 class="auth-deco-title">Faça parte da<br/><em>nossa comunidade</em></h2>
        <p class="auth-deco-sub">Mais de 2.000 títulos esperando por você</p>
      </div>
    </div>

    <!-- LADO DIREITO — FORMULÁRIO -->
    <div class="auth-form-side">

      <a href="/" class="auth-logo">Groove Store</a>

      <p class="auth-eyebrow">Crie sua conta</p>
      <h1 class="auth-title">Bem-vindo à<br/>Groove Store</h1>

      <form action="#" th:action="@{/cadastro}" method=post th:object="${user}">

        <div class="form-row">
          <div class="form-group">
            <label for="username">Usuário</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="@usuario"
              autocomplete="username"
              th:field="*{id}"
              required
            />
          </div>
          <div class="form-group">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome"
              autocomplete="name"
              th:field="*{nome}"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            th:field="*{email}"
            required
          />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Mín. 8 caracteres"
              autocomplete="new-password"
              th:field="*{senha}"
              required
            />
            <button type="button" class="toggle-pw" onclick="toggleSenha('senha', this)" aria-label="Mostrar senha">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth" style="margin-top: 8px;">Criar conta</button>

        <div class="auth-divider"><span>ou</span></div>

        <p class="auth-switch">
          Já tem conta?
          <a href="/login">Entrar</a>
        </p>

      </form>
    </div>

  </div>

  <script>
    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
             <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
             <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
             <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
             <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
             <circle cx="12" cy="12" r="3"/>
           </svg>`;
    }
  </script>

</body>
</html>
